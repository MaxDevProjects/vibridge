<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Bridge arch -->
  <path
    d="M4 32 Q4 14 24 14 Q44 14 44 32"
    stroke="currentColor"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Left pillar -->
  <line x1="7" y1="32" x2="7" y2="40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right pillar -->
  <line x1="41" y1="32" x2="41" y2="40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Deck -->
  <line x1="3" y1="32" x2="45" y2="32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left hang cable -->
  <line x1="7" y1="32" x2="16" y2="21" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right hang cable -->
  <line x1="41" y1="32" x2="32" y2="21" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Center node -->
  <circle cx="24" cy="14" r="3" fill="currentColor"/>
</svg>
