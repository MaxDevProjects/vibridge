# DevBridge — Production Compose (VPS only)
# Runs: relay + nuxt-ui
# The agent runs locally on the dev PC, NOT on the server.
#
# Required .env on the server:
#   RELAY_JWT_SECRET=...
#   RELAY_PUBLIC_URL=https://YOUR_DOMAIN/relay
#   NUXT_PUBLIC_RELAY_URL=https://YOUR_DOMAIN/relay

services:
  relay:
    build:
      context: ./relay
      dockerfile: Dockerfile
    image: devbridge-relay:prod
    container_name: devbridge-relay
    restart: always
    ports:
      - "4444:4444"
    environment:
      NODE_ENV: production
      RELAY_PORT: 4444
      RELAY_JWT_SECRET: ${RELAY_JWT_SECRET:?Set RELAY_JWT_SECRET in .env}
      RELAY_PUBLIC_URL: ${RELAY_PUBLIC_URL:?Set RELAY_PUBLIC_URL in .env}
      RELAY_UI_URL: ${RELAY_UI_URL:?Set RELAY_UI_URL in .env (ex: https://vibridge.clowerstudio.com)}
      RELAY_SESSION_TTL_MS: ${RELAY_SESSION_TTL_MS:-43200000}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4444/health',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - devbridge

  ui:
    build:
      context: ./nuxt-ui
      dockerfile: Dockerfile
    image: devbridge-ui:prod
    container_name: devbridge-ui
    restart: always
    ports:
      - "3000:4000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      # In relay mode (prod), the PWA connects to the relay, not a local agent
      NUXT_PUBLIC_RELAY_URL: ${RELAY_PUBLIC_URL}
      NUXT_PUBLIC_AGENT_HOST: ${NUXT_PUBLIC_AGENT_HOST:-devbridge.local}
      NUXT_PUBLIC_AGENT_PORT: ${NUXT_PUBLIC_AGENT_PORT:-3333}
    depends_on:
      relay:
        condition: service_healthy
    networks:
      - devbridge

networks:
  devbridge:
    driver: bridge
