# DevBridge — Nginx reverse proxy config
#
# Replace YOUR_DOMAIN with your actual domain (e.g. devbridge.example.com)
#
# First-time SSL setup (run BEFORE starting nginx with port 443):
#   1. Start nginx with only the HTTP block active (comment out the HTTPS server)
#   2. Run: certbot certonly --webroot -w /var/www/certbot -d YOUR_DOMAIN
#   3. Uncomment the HTTPS server block and reload nginx
#
# Routing:
#   https://YOUR_DOMAIN/relay/...  → relay container (HTTP API + WebSocket)
#   https://YOUR_DOMAIN/           → nuxt-ui container (PWA)

# ── HTTP — redirect to HTTPS + ACME challenge ────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    # ── Relay — HTTP API + WebSocket (/relay/* → relay:4444/*)
    # nginx strips /relay prefix before forwarding (trailing slash in proxy_pass)
    location /relay/ {
        proxy_pass         http://relay:4444/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Keep WebSocket connections alive
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── PWA — Nuxt UI (everything else → ui:4000)
    location / {
        proxy_pass         http://ui:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
